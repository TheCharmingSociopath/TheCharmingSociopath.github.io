  - title: "Einstein: His Life and Universe"
    author: Walter Isaacson
    stars: 4
    comments: Really don't know how to rate this. It is a slow read, a bit boring at times. Or maybe I'm just not that into biographies. It is very well written, and I did enjoy it. Time well spent, and I'd do it again. 
