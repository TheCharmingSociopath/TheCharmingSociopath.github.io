  - title: "Death's End"
    author: "Cixin Liu (Author); Ken Liu (Translator)"
    stars: 4
    comments: Audiobook. I loved all 3 of these books, and would recommend reading. But the book 2 is definitely a favourite. Parts of the story in this one go too far, in my opinion. 
  - title: "The Dark Forest"
    author: "Cixin Liu (Author); Joel Martinsen (Translator)"
    stars: 5
    comments: Audiobook. Beautiful story, amazing translation, amazing narration. The world (and I mean the universe, or the galaxy) would be a pretty sad place if the dark forest theory were true; I would rather live in a world where there is easy exchange of ideas and culture. I don't think that it's true. If I were in a dark forest, I would definitely attempt communication and negotiation with those around me. But maybe I'm too naive. Luo Ji was certainly an interesting character. Another very interesting part about the book was the evolution of language, culture and people over the centuries. I was obcessed and hooked on to the audiobook, spent 3 days doing nothing except listen to books 2 and 3 of the triology. I'll definitely read a paperback at some point. 
